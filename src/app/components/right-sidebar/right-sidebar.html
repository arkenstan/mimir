<div class="right-sidebar-container">
  <div class="sidebar-tabs">
    @if (shortcutService.rightSidebarOpen()) {
      <button class="close-btn" (click)="close()">
        <span class="material-icons">close</span>
      </button>
    }
    <button [class.active]="activeTab === 'Synthesis' && shortcutService.rightSidebarOpen()" (click)="toggleTab('Synthesis')">
      <span class="material-icons">auto_awesome</span>
      <span>Synthesis</span>
    </button>
    <button [class.active]="activeTab === 'Settings' && shortcutService.rightSidebarOpen()" (click)="toggleTab('Settings')">
      <span class="material-icons">settings</span>
      <span>Settings</span>
    </button>
  </div>
  @if (shortcutService.rightSidebarOpen()) {
    <div class="sidebar-content">
      @if (activeTab === 'Synthesis') {
        <mimir-synthesis-panel></mimir-synthesis-panel>
      }
      @if (activeTab === 'Settings') {
        <mimir-settings-panel></mimir-settings-panel>
      }
    </div>
  }
</div>
