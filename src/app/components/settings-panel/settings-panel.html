<div class="settings-container">
  <h3>Ollama Settings</h3>
  <div class="form-group">
    <label>Host URL</label>
    <input type="text" [(ngModel)]="host" placeholder="http://127.0.0.1:11434">
  </div>
  <div class="form-group">
    <label>Model Name</label>
    <input type="text" [(ngModel)]="model" placeholder="gemma4:latest">
  </div>
  <button class="primary" (click)="save()">Save Config</button>
</div>
